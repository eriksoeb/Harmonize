<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Harmonize Log Viewer</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }
    .log-line {
        padding: 6px 0;
        border-bottom: 1px solid #ddd;
        white-space: pre-wrap;
    }
</style>
</head>
<body>

<h2>Latest Harmonize Logs</h2>
<div id="log"></div>

<h2>Unique Clients</h2>
<div id="clients"></div>

<script>
fetch('upgrade.log')
    .then(response => response.text())
    .then(text => {
        const lines = text
            .trim()
            .split('\n')
            .slice(-25)
            .reverse(); // newest first

        const container = document.getElementById('log');

        lines.forEach(line => {
            const div = document.createElement('div');
            div.className = 'log-line';
            div.textContent = line;
            container.appendChild(div);
        });

        // Unique clients from all lines
        const allLines = text.trim().split('\n').filter(l => l.trim());
        const clients = [...new Set(
            allLines.map(line => {
                const field = line.split(' | ')[3];
                return field ? field.replace('Client: ', '').trim() : null;
            }).filter(Boolean)
        )].sort();

        const clientContainer = document.getElementById('clients');
        clients.forEach(client => {
            const div = document.createElement('div');
            div.className = 'log-line';
            div.textContent = client;
            clientContainer.appendChild(div);
        });
    })
    .catch(err => {
        document.getElementById('log').textContent =
            'Unable to load log file.';
    });
</script>

</body>
</html>
