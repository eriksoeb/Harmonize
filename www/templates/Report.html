<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="icon" href="../images/no.png" type="image/png">

<link rel="stylesheet" type="text/css" href="../Harmonize.css">
<title>Report - Toggle Layout with Freeze</title>



<style>

.btn-bar {
    display: flex;
    gap: 8px;
    padding: 8px;
}

.btn-bar button {
    width: 160px;
    padding: 6px 10px;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
}

.table-container {
    overflow: auto;
    max-width: 100%;
    max-height: 100% /* adjust as needed */
    border: 1px solid #ddd;
}

table {
    border-collapse: collapse;
    font-family: Arial, sans-serif;
    min-width: 600px;
}

th, td {
    border: 1px solid #ddd;
    padding: 6px 8px;
    text-align: right;
    background-clip: padding-box;
}

th {
    position: sticky;
    top: 0;
    background-color: #f2f2f2;
    z-index: 3;
}

th:first-child, td:first-child {
    position: sticky;
    left: 0;
    background-color: #f9f9f9;
    z-index: 4; /* higher than row cells for overlap */
    text-align: left;
}

tbody tr:nth-child(even) td:not(:first-child) {
    background-color: #f9f9f9;
}

.desc {
    display: block;
    font-size: 0.85em;
    font-weight: normal;
    color: #555;
    margin-top: 2px;
}


</style>
</head>

<body>


<div class="mobile-container">
    <div class="topnav">
		 
		 <a href="../index.html">Harmonize.no</a>
	 	 <a href="demo.html">Demo</a>

		<a href="Report.html" class="active">Report</a>
-->
	 
    </div>
</div>


<div class="btn-bar">
    <button id="toggleLayout">Switch to Horizontal</button>
    <button id="toggleDateFormat">Long date</button>
    <button id="exportCsv">Export CSV</button>
</div>
<div class="table-container" id="textDataTable"></div>

<script>

let useLongDate = false;


function formatDate1(ts) {
  const d = new Date(ts);

  const date =
    `${d.getFullYear()}-` +
    `${String(d.getMonth() + 1).padStart(2, '0')}-` +
    `${String(d.getDate()).padStart(2, '0')}`;

  if (!useLongDate) return date;

  const time =
    `${String(d.getHours()).padStart(2, '0')}:` +
    `${String(d.getMinutes()).padStart(2, '0')}`;

  return `${date} ${time}`;
}


function formatDate2(ts) {
  const d = new Date(ts);

  const date =
    `${d.getUTCFullYear()}-` +
    `${String(d.getUTCMonth() + 1).padStart(2, '0')}-` +
    `${String(d.getUTCDate()).padStart(2, '0')}`;

  if (!useLongDate) return date;

  const time =
    `${String(d.getUTCHours()).padStart(2, '0')}:` +
    `${String(d.getUTCMinutes()).padStart(2, '0')}`;

  return `${date} ${time}`;
}


//data :  [
//[1698537600000,-2.00000000],
//[1698541200000,-1.00000000],



// Treat ts as "already-correct wall clock time not 02 twice"
function formatDate(ts) {
  const d = new Date(ts);

  // Extract UTC fields ONLY
  const y = d.getUTCFullYear();
  const m = d.getUTCMonth() + 1;
  const day = d.getUTCDate();
  const h = d.getUTCHours();
  const min = d.getUTCMinutes();

  const date = `${y}-${String(m).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  if (!useLongDate) return date;

  return `${date}T${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
}



function getQueryParam(name) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(name);
}

// Use default if parameter missing
let fileName = getQueryParam("filename") || "Mydata.json";

let seriesData;

fetch(fileName)
    .then(response => {
        if (!response.ok) throw new Error("Failed to load: " + fileName);
        return response.json();
    })
    .then(json => {
        console.log("Data file loaded:", fileName);
        seriesData = Array.isArray(json) ? json : [json];
        initReport();
    })
    .catch(err => {
        alert(err.message);
    });








//document.addEventListener('DOMContentLoaded', function InitReport() {
//document.addEventListener('DOMContentLoaded', function () {
function initReport() {

    if (typeof seriesData === 'undefined' || seriesData.length === 0) {
        document.getElementById('textDataTable').innerText =
            'No data available to display.';
        return;
    }

    const dataToDisplay = seriesData[0].series;
	const DECIMALS = seriesData[0].decimals ?? 0;  //default
    const tableContainer = document.getElementById('textDataTable');
    let isVertical = true;
    if ((seriesData[0].frequency ?? '') === 'HOURLY') useLongDate = true;


    const getAllDates = () => {
        // Count max occurrences of each timestamp across all series (handles DST duplicates)
        const maxCount = {};
        dataToDisplay.forEach(series => {
            const counts = {};
            series.data.forEach(item => { counts[item[0]] = (counts[item[0]] || 0) + 1; });
            Object.keys(counts).forEach(ts => {
                maxCount[ts] = Math.max(maxCount[ts] || 0, counts[ts]);
            });
        });
        // Expand: each timestamp repeated by its max occurrence count
        const allDates = [];
        Object.keys(maxCount).map(Number).sort((a,b) => a-b).forEach(ts => {
            for (let i = 0; i < maxCount[ts]; i++) allDates.push({ ts, occ: i });
        });
        return allDates;
    }

    const renderTable = () => {
        tableContainer.innerHTML = '';
        const table = document.createElement('table');
        const allDates = getAllDates();

        if (isVertical) {
            /* ---------- VERTICAL ---------- */
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            const dateHeader = document.createElement('th'); dateHeader.innerText = 'Date';
            headerRow.appendChild(dateHeader);

            dataToDisplay.forEach(series => {
                const th = document.createElement('th');
				 th.innerHTML = `${series.style?.function || ''} ${series.name}<span class="desc">${series.description || ''}</span>`;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            allDates.forEach(({ts, occ}) => {
                const row = document.createElement('tr');
                const dateCell = document.createElement('td');
				dateCell.innerText = formatDate(ts);
				row.appendChild(dateCell);

                dataToDisplay.forEach(series => {
                    const cell = document.createElement('td');
                    const point = series.data.filter(item => item[0] === ts)[occ];
					cell.innerText = point && typeof point[1] === 'number' ? point[1].toFixed(DECIMALS) : '';
                    row.appendChild(cell);
                });

                tbody.appendChild(row);
            });
            table.appendChild(tbody);

        } else {
            /* ---------- HORIZONTAL ---------- */
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            const firstCell = document.createElement('th'); firstCell.innerText = 'Series';
            headerRow.appendChild(firstCell);

            allDates.forEach(({ts}) => {
                const dateStr = formatDate(ts);
				const th = document.createElement('th'); th.innerText = dateStr;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            dataToDisplay.forEach((series,i) => {
                const row = document.createElement('tr');
                const seriesCell = document.createElement('td');
                seriesCell.innerHTML = `${series.name}<span class="desc">${series.description || ''}</span>`;
                row.appendChild(seriesCell);

                allDates.forEach(({ts, occ}) => {
                    const cell = document.createElement('td');
                    const point = series.data.filter(item => item[0] === ts)[occ];
                    cell.innerText = point && typeof point[1] === 'number' ? point[1].toFixed(DECIMALS) : '';
                    row.appendChild(cell);
                });

                tbody.appendChild(row);
            });
            table.appendChild(tbody);
        }

        tableContainer.appendChild(table);
    }

    /* ---------- TOGGLE s---------- */
    document.getElementById('toggleLayout').addEventListener('click', function() {
        isVertical = !isVertical;
        this.innerText = isVertical ? 'Switch to Horizontal' : 'Switch to Vertical';
        renderTable();
    });
	
	 /* ---------- TOGGLE s---------- */
    const toggleDateBtn = document.getElementById('toggleDateFormat');
    toggleDateBtn.innerText = useLongDate ? 'Short date' : 'Long date';
	toggleDateBtn.addEventListener('click', function () {
	useLongDate = !useLongDate;
	this.innerText = useLongDate ? 'Short date' : 'Long date';
	renderTable();
});
	
	
	
	
	
	
	
	

    /* ---------- CSV ---------- */
    const doExportCsv = () => {
        let csv = [];
        const allDates = getAllDates();

        if (isVertical) {
            const header = ['Date'].concat(dataToDisplay.map(s => `"${s.name} - ${s.description || ''}"`));
            csv.push(header.join(','));

            allDates.forEach(({ts, occ}) => {
                const row = [formatDate(ts)];
                dataToDisplay.forEach(series => {
                    const point = series.data.filter(item => item[0] === ts)[occ];
                    row.push(point && typeof point[1] === 'number' ? point[1].toFixed(DECIMALS) : '');
                });
                csv.push(row.join(','));
            });

        } else {
            const header = ['Series'].concat(allDates.map(({ts}) => formatDate(ts)));
            csv.push(header.join(','));

            dataToDisplay.forEach(series => {
                const row = [`"${series.name} - ${series.description || ''}"`];
                allDates.forEach(({ts, occ}) => {
                    const point = series.data.filter(item => item[0] === ts)[occ];
                    row.push(point && typeof point[1] === 'number' ? point[1].toFixed(DECIMALS) : '');
                });
                csv.push(row.join(','));
            });
        }

        const blob = new Blob([csv.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = (fileName.split('/').pop().replace('.json', '') || 'report') + '.csv';
        a.click();
        URL.revokeObjectURL(url);
    };

    document.getElementById('exportCsv').addEventListener('click', doExportCsv);

    // Initial render
    renderTable();

    // Auto-download if ?download=csv is in the URL
    if (getQueryParam('download') === 'csv') {
        doExportCsv();
    }

}
</script>

</body>
</html>
